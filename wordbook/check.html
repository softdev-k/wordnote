<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>単語帳 - 確認</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div class="container">
    <header class="top-header">
      <a class="back-link" href="#" id="backLink">← 戻る</a>
      <div style="position:relative;">
        <h1>
          <div style="font-size:2rem;color:#2c3e50;margin-bottom:0.5rem;">
            <span id="currentFolderName"></span>
          </div>
          <div style="text-align:center;">
            <span id="studyButtonArea"></span>
          </div>
        </h1>
        <div style="position:absolute;top:0;right:0;padding:0.5rem;">
          <span id="cardCount" class="count-display">...</span>
        </div>
      </div>
    </header>

    <div class="check-content">
      <div id="flashcards" class="flashcards-grid">
        <!-- カードは JavaScript で動的に追加されます -->
      </div>
    </div>
  </div>

  <!-- 学習モードモーダル -->
  <div id="studyModal" class="modal">
    <div class="modal-content" style="max-width:600px;min-height:400px;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h2 style="margin:0;">学習モード</h2>
        <button id="closeStudyModal" class="modal-btn cancel-btn" style="padding:0.5rem 1rem;">×</button>
      </div>
      
      <div id="studyProgress" style="text-align:center;margin-bottom:1rem;color:#666;font-size:0.9rem;"></div>
      
      <div style="display:flex;gap:0.5rem;justify-content:center;margin-bottom:1rem;">
        <button id="showFront" class="mode active">表</button>
        <button id="showBack" class="mode">裏</button>
      </div>
      
      <div id="studyCardContainer" style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="flashcard" style="perspective:1000px;width:100%;max-width:400px;">
          <div id="studyCard" class="card" style="width:100%;height:250px;font-size:1.5rem;cursor:pointer;position:relative;">
            <div class="card-front"></div>
            <div class="card-back"></div>
          </div>
        </div>
      </div>
      
      <div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem;">
        <button id="prevCard" class="modal-btn" style="background:#95a5a6;">← 前へ</button>
        <button id="nextCard" class="modal-btn" style="background:#3498db;">次へ →</button>
      </div>
    </div>
  </div>

  <script src="static/check.js"></script>
</body>
</html>
