<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語帳</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <div class="container">

        <header class="top-header">
            <a class="back-link" href="#" id="backLink">← 戻る</a>
            <h1>
                <span id="currentFolderName" style="font-size:2rem;color:#2c3e50"></span>
            </h1>
        </header>

        <div class="layout">    

            <!-- 右側（全画面表示） -->
            <div class="right-panel full-width">
                <div class="right-controls">
                    <div class="left-buttons">
                        <button class="control-btn" id="btnAdd">追加</button>
                        <button class="control-btn" id="btnDelete">削除</button>
                        <button class="control-btn" id="btnEdit">変更</button>
                    </div>
                    <div id="cardCount" class="count-display">...</div>
                </div>
                <div id="flashcards">
                    <!-- 右側のカードは JavaScript で動的に追加されます -->
                </div>
            </div>

        </div>
        
    </div>

    <!-- 削除確認モーダル -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>カードの削除</h2>
            <p id="deleteMessage"></p>
            <div class="modal-buttons">
                <button id="confirmDelete" class="modal-btn confirm-btn">削除する</button>
                <button id="cancelDelete" class="modal-btn cancel-btn">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- 追加モーダル -->
    <div id="addModal" class="modal">
        <div class="modal-content edit-modal-content">
            <h2>新しいカードを追加</h2>
            <div class="edit-form">
                <div class="mode-toggle">
                    <button id="addBtnFront" class="mode active">表</button>
                    <button id="addBtnBack" class="mode">裏</button>
                </div>

                <textarea id="addEditor" placeholder="ここに入力"></textarea>

                <div class="preview">
                    <div class="preview-item"><strong>表:</strong> <span id="addPreviewFront">(未設定)</span></div>
                    <div class="preview-item"><strong>裏:</strong> <span id="addPreviewBack">(未設定)</span></div>
                    <div id="addPreviewMessage" class="preview-message" aria-live="polite"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="confirmAdd" class="modal-btn confirm-btn">追加する</button>
                <button id="cancelAdd" class="modal-btn cancel-btn">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div id="editModal" class="modal">
        <div class="modal-content edit-modal-content">
            <h2>カードの編集</h2>
            <div class="edit-form">
                <div class="mode-toggle">
                    <button id="editBtnFront" class="mode active">表</button>
                    <button id="editBtnBack" class="mode">裏</button>
                </div>

                <textarea id="editEditor" placeholder="ここに入力"></textarea>

                <div class="preview">
                    <div class="preview-item"><strong>表:</strong> <span id="editPreviewFront">(未設定)</span></div>
                    <div class="preview-item"><strong>裏:</strong> <span id="editPreviewBack">(未設定)</span></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="confirmEdit" class="modal-btn confirm-btn">変更する</button>
                <button id="cancelEdit" class="modal-btn cancel-btn">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="static/app.js"></script>

</body>

</html>
