<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語入力 - 英単語帳アプリ</title>
    <link rel="stylesheet" href="info_plus.css">
</head>
<body>
    <div class="container">
        <h1>単語入力（初級）</h1>

        <div class="split-layout">
            <div class="form-column">
        
        <form id="wordForm" class="word-form">
            <!-- 品詞選択（複数可） -->
            <div class="form-group">
                <label>品詞（複数選択可） <span class="required">*</span></label>
                <div class="pos-checkboxes">
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="名詞" class="pos-checkbox">
                        名詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="動詞" class="pos-checkbox">
                        動詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="形容詞" class="pos-checkbox">
                        形容詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="副詞" class="pos-checkbox">
                        副詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="前置詞" class="pos-checkbox">
                        前置詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="接続詞" class="pos-checkbox">
                        接続詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="代名詞" class="pos-checkbox">
                        代名詞
                    </label>
                    <label class="pos-checkbox-label">
                        <input type="checkbox" name="partOfSpeech" value="間投詞" class="pos-checkbox">
                        間投詞
                    </label>
                </div>
            </div>

            <!-- 単語 -->
            <div class="form-group">
                <label for="word">単語 <span class="required">*</span></label>
                <input type="text" id="word" placeholder="例: apple" required disabled>
            </div>

            <!-- 発音記号 -->
            <div class="form-group">
                <label for="pronunciation">発音記号</label>
                <input type="text" id="pronunciation" placeholder="例: /ˈæpl/">
            </div>

            <!-- 基本の意味 -->
            <div class="form-group">
                <label>基本の意味（和訳） <span class="required">*</span></label>
                <div id="meaningsContainer">
                    <div class="meaning-input">
                        <input type="text" class="meaning" placeholder="意味を入力" required>
                    </div>
                </div>
                <button type="button" id="addMeaning" class="btn btn-add">+ 意味を追加</button>
            </div>

            <!-- 英訳（基本の意味と同数に自動連動） -->
            <div class="form-group">
                <label>英訳（基本の意味と同数）</label>
                <div id="translationsContainer">
                    <div class="translation-input">
                        <input type="text" class="translation" placeholder="英訳を入力">
                    </div>
                </div>
                <small style="color:#777;">※ 基本の意味の個数に合わせて自動で増減します</small>
            </div>

            <!-- サブの意味（最大2） -->
            <div class="form-group">
                <label>サブの意味（任意・最大2つ）</label>
                <div id="subMeaningsContainer">
                    <div class="sub-meaning-input" style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                        <input type="text" class="sub-meaning" placeholder="サブの意味を入力" style="flex: 1;">
                        <select class="sub-meaning-pos" style="width: 100px;">
                            <option value="">品詞選択</option>
                        </select>
                    </div>
                </div>
                <button type="button" id="addSubMeaning" class="btn btn-add">+ サブの意味を追加</button>
            </div>

            <!-- 類義語 / 対義語 / 派生語 -->
            <div class="form-group">
                <label>類義語（任意・最大3つ）</label>
                <div id="synonymsContainer">
                    <div class="synonym-input">
                        <input type="text" class="synonym" placeholder="類義語を入力">
                        <button type="button" class="remove-synonym" style="display:none;">－</button>
                    </div>
                </div>
                <button type="button" id="addSynonym" class="btn btn-add">＋</button>
            </div>

            <div class="form-group">
                <label>対義語（任意・最大1つ）</label>
                <div id="antonymsContainer">
                    <div class="antonym-input">
                        <input type="text" class="antonym" placeholder="対義語を入力">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>派生語（任意・最大3つ）</label>
                <div id="derivativesContainer">
                    <div class="derivative-input">
                        <input type="text" class="derivative" placeholder="派生語を入力">
                        <button type="button" class="remove-derivative" style="display:none;">－</button>
                    </div>
                </div>
                <button type="button" id="addDerivative" class="btn btn-add">＋</button>
            </div>

            <!-- 例文（最大個数は基本の意味+サブの意味の個数）-->
            <div class="form-group">
                <label>例文（任意）<span id="exampleMaxCount" style="color: #999; font-size: 0.9em; font-weight: normal;"></span></label>
                <div id="examplesContainer">
                    <div class="example-input">
                        <input type="text" class="example" placeholder="例文を入力">
                        <button type="button" class="remove-example" style="display:none;">－</button>
                    </div>
                </div>
                <button type="button" id="addExample" class="btn btn-add">＋</button>
            </div>

            <!-- チャンク例文（最大4個）-->
            <div class="form-group">
                <label>チャンク例文（任意・最大4つ）</label>
                <div id="chunkExamplesContainer">
                    <div class="chunk-example-input">
                        <input type="text" class="chunk-example" placeholder="チャンク例文を入力">
                        <button type="button" class="remove-chunk-example" style="display:none;">－</button>
                    </div>
                </div>
                <button type="button" id="addChunkExample" class="btn btn-add">＋</button>
            </div>

            <!-- よく使う表現の例文（最大4個）-->
            <div class="form-group">
                <label>よく使う表現の例文（任意・最大4つ）</label>
                <div id="phraseExamplesContainer">
                    <div class="phrase-example-input">
                        <input type="text" class="phrase-example" placeholder="よく使う表現の例文を入力">
                        <button type="button" class="remove-phrase-example" style="display:none;">－</button>
                    </div>
                </div>
                <button type="button" id="addPhraseExample" class="btn btn-add">＋</button>
            </div>

            <!-- 画像URL -->
            <div class="form-group">
                <label for="imageUrl">画像URL（任意）</label>
                <input type="text" id="imageUrl" placeholder="画像のURLを入力">
            </div>

            <!-- 学習を始める難易度 -->
            <div class="form-group">
                <label for="infoPlusProgress">学習を始める難易度（変更不可）</label>
                <select id="infoPlusProgress" disabled>
                    <option value="">未設定</option>
                </select>
            </div>

            <!-- メモ -->
            <div class="form-group">
                <label for="memo">メモ（任意）<span style="color: #999; font-size: 0.9em; font-weight: normal;"> - 100文字以内</span></label>
                <textarea id="memo" rows="4" maxlength="100" placeholder="補足情報やメモを入力"></textarea>
                <div class="char-counter">
                    <span id="charCount">0</span> / 100文字
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存して追加</button>
                <button type="button" id="clearForm" class="btn btn-secondary">クリア</button>
                <button type="button" id="finishBtn" class="btn btn-finish">終了</button>
            </div>
            <div class="form-actions" style="margin-top: 10px;">
                <button type="button" id="completeBtn" class="btn btn-complete">完了</button>
            </div>
        </form>
            </div>

            <div class="preview-column">
                <div class="preview-panel">
                    <h2>プレビュー</h2>
                    <div class="preview-layout">
                        <!-- 左側：基本情報 -->
                        <div class="preview-left">
                            <div class="preview-header">
                                <div class="preview-pos" id="previewPos">品詞</div>
                                <div class="preview-word" id="previewWord">単語</div>
                                <button class="preview-audio-btn">音声</button>
                            </div>
                            <div class="preview-pronunciation" id="previewPron">発音記号</div>
                            
                            <div class="preview-meanings">
                                <h4>和訳（基本の意味）</h4>
                                <ul id="previewMeanings">
                                    <li>1. 意味</li>
                                </ul>
                            </div>

                            <div id="previewTranslationsSection" class="preview-meanings">
                                <h4>英訳</h4>
                                <ul id="previewTranslations">
                                    <li>1. 英訳</li>
                                </ul>
                            </div>
                            
                            <div id="previewSubMeaningsSection" class="preview-meanings">
                                <h4>和訳（サブの意味）</h4>
                                <ul id="previewSubMeanings"></ul>
                            </div>
                            
                            <div id="previewDerivativesSection" class="preview-meanings">
                                <h4>派生語</h4>
                                <p id="previewDerivatives"></p>
                            </div>
                            
                            <div id="previewSynAntsSection" class="preview-meanings">
                                <h4>類義語/反義語</h4>
                                <div id="previewSynAnts"></div>
                            </div>
                            
                            <div class="preview-image" id="previewImage">画像</div>
                            
                            <div class="preview-memo" id="previewMemo">
                                <h3>メモ（任意）</h3>
                                <p>メモがここに表示されます</p>
                            </div>
                        </div>
                        
                        <!-- 右側：例文 -->
                        <div class="preview-right">
                            <div id="previewExamples" class="preview-examples"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="info_plus.js"></script>
</body>
</html>
